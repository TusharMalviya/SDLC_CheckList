<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CRONOS – Business Analyst</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>

<a class="home-btn" href="index.html">&#127968; Home</a>

<header style="background:var(--ba)">
  <div>
    <h1>&#128101; Business Analyst</h1>
    <p>FSD lifecycle &bull; Modification history &bull; Validation sign-off</p>
  </div>
  <span class="badge" style="color:var(--ba)">BA Page &nbsp;|&nbsp; CRONOS v3.0</span>
</header>

<!-- ══ BA DETAILS ══ -->
<div class="section section-ba">
  <div class="section-title">
    <span class="role-badge rb-ba">&#128101; BA Lifecycle</span>
    <h2>FSD &amp; Validation Tracking</h2>
  </div>
  <div class="field-grid">
    <div class="field"><label>BA Name</label>
      <input type="text" id="ba-name" placeholder="Full name of the BA" oninput="autoSave()"/></div>
    <div class="field"><label>Jira / Story Number</label>
      <input type="text" id="ba-jira" placeholder="e.g. DVNSPRINT-1234" oninput="autoSave()"/></div>
    <div class="field"><label>FSD Start Date</label>
      <input type="date" id="ba-start" oninput="autoSave()"/></div>
    <div class="field"><label>FSD End Date</label>
      <input type="date" id="ba-end" oninput="autoSave()"/></div>
    <div class="field"><label>Validator / Reviewer Name</label>
      <input type="text" id="ba-validator" placeholder="Name of person who validated FSD" oninput="autoSave()"/></div>
    <div class="field span2"><label>Initial Requirement Brief</label>
      <textarea id="ba-brief" rows="3" placeholder="Plain text summary of the business requirement / pain point..." oninput="autoSave()"></textarea></div>
    <div class="field span2">
      <label>FSD Validation Sign-off</label>
      <div class="signoff-widget">
        <div class="so-toggle">
          <button class="so-tab-btn active" id="ba-so-tab-link" onclick="switchSOMode('ba','link')">&#128279; Paste Link</button>
          <button class="so-tab-btn" id="ba-so-tab-img" onclick="switchSOMode('ba','img')">&#128247; Upload Image</button>
        </div>
        <div id="ba-so-link-pane">
          <input type="url" id="ba-signoff" placeholder="Paste link to sign-off mail / approval document" oninput="autoSave()"/>
        </div>
        <div id="ba-so-img-pane" style="display:none">
          <div class="img-upload-area" onclick="document.getElementById('ba-so-file').click()">
            <input type="file" id="ba-so-file" accept="image/*" onchange="handleSignoffImage('ba-so-file','ba-so-preview','ba_img')"/>
            <label class="img-upload-lbl">&#128247; Click to upload sign-off screenshot</label>
          </div>
          <div class="signoff-preview" id="ba-so-preview">
            <img id="ba-so-img-el" src="" alt="BA sign-off proof"/>
            <button class="clear-img" onclick="clearSignoffImage('ba-so-preview','ba_img')" title="Remove">&#10005;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FSD Modification History -->
  <div class="divider"></div>
  <strong style="font-size:.88rem;color:var(--ba)">&#128221; FSD Modification History</strong>
  <div id="fsd-mod-list" style="margin-top:10px;display:flex;flex-direction:column;gap:10px"></div>
  <button class="add-btn" style="margin-top:12px" onclick="addFSDMod()">&#43; Add FSD Modification</button>
</div>

<div class="actions">
  <button class="btn-ba" onclick="downloadBAReport()">&#11015; Download BA Report (.json)</button>
  <button class="btn-purple" onclick="downloadBAHtml()">&#128196; Download BA Report (.html)</button>
  <button class="btn-reset" onclick="resetBA()">&#8635; Reset</button>
</div>

<footer>CRONOS &nbsp;|&nbsp; Business Analyst Page &nbsp;|&nbsp; March 2026</footer>

<script>
const BA_IDS=['ba-name','ba-jira','ba-start','ba-end','ba-validator','ba-brief','ba-signoff'];
let fsdModCount=0;

function storageKey(){return 'cronos_ba_'+(document.getElementById('ba-jira')?.value.trim()||'default');}

function autoSave(){
  const s={};
  BA_IDS.forEach(id=>{const el=document.getElementById(id);if(el)s[id]=el.value;});
  try{localStorage.setItem(storageKey(),JSON.stringify(s));saveFSDMods();}catch(e){}
}

function loadSaved(){
  const raw=localStorage.getItem(storageKey());
  if(!raw) return;
  try{
    const s=JSON.parse(raw);
    BA_IDS.forEach(id=>{const el=document.getElementById(id);if(el&&s[id]!==undefined)el.value=s[id];});
    const mods=JSON.parse(localStorage.getItem(storageKey()+'_mods')||'[]');
    document.getElementById('fsd-mod-list').innerHTML=''; fsdModCount=0;
    mods.forEach(m=>addFSDMod(m));
    const img=localStorage.getItem(storageKey()+'_ba_img');
    if(img){const pd=document.getElementById('ba-so-preview');if(pd){pd.querySelector('img').src=img;pd.style.display='block';}switchSOMode('ba','img');}
  }catch(e){}
}

function addFSDMod(data){
  fsdModCount++;
  const id='fsdmod-'+fsdModCount;
  const div=document.createElement('div');
  div.className='entry-card'; div.id=id;
  div.innerHTML=`<button class="remove-btn" onclick="this.closest('.entry-card').remove();saveFSDMods()">&#10005;</button>
    <div class="field-grid">
      <div class="field"><label>Mod #${fsdModCount} – Start Date</label>
        <input type="date" id="${id}-start" value="${data?.start||''}" oninput="saveFSDMods()"/></div>
      <div class="field"><label>End Date</label>
        <input type="date" id="${id}-end" value="${data?.end||''}" oninput="saveFSDMods()"/></div>
      <div class="field"><label>FSD Version</label>
        <input type="text" id="${id}-ver" placeholder="e.g. FSD_v2.1" value="${data?.ver||''}" oninput="saveFSDMods()"/></div>
      <div class="field"><label>Validator Name</label>
        <input type="text" id="${id}-validator" placeholder="Reviewer name" value="${data?.validator||''}" oninput="saveFSDMods()"/></div>
      <div class="field span2"><label>Modification Summary</label>
        <textarea id="${id}-desc" rows="2" placeholder="What changed..." oninput="saveFSDMods()">${data?.desc||''}</textarea></div>
    </div>`;
  document.getElementById('fsd-mod-list').appendChild(div);
}

function saveFSDMods(){
  const mods=[];
  document.querySelectorAll('#fsd-mod-list .entry-card').forEach(card=>{
    const id=card.id;
    mods.push({
      start:card.querySelector(`#${id}-start`)?.value||'',
      end:  card.querySelector(`#${id}-end`)?.value||'',
      ver:  card.querySelector(`#${id}-ver`)?.value||'',
      validator:card.querySelector(`#${id}-validator`)?.value||'',
      desc: card.querySelector(`#${id}-desc`)?.value||''
    });
  });
  try{localStorage.setItem(storageKey()+'_mods',JSON.stringify(mods));}catch(e){}
}

function handleSignoffImage(inputId,previewId,storageId){
  const file=document.getElementById(inputId)?.files?.[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const b64=e.target.result;
    try{localStorage.setItem(storageKey()+'_'+storageId,b64);}catch(err){}
    const pd=document.getElementById(previewId);
    if(pd){pd.querySelector('img').src=b64;pd.style.display='block';}
  };
  reader.readAsDataURL(file);
}

function clearSignoffImage(previewId,storageId){
  const pd=document.getElementById(previewId);
  if(pd){pd.querySelector('img').src='';pd.style.display='none';}
  try{localStorage.removeItem(storageKey()+'_'+storageId);}catch(e){}
  switchSOMode('ba','link');
}

function switchSOMode(prefix,mode){
  document.getElementById(prefix+'-so-link-pane').style.display=mode==='link'?'':'none';
  document.getElementById(prefix+'-so-img-pane').style.display=mode==='img'?'':'none';
  document.getElementById(prefix+'-so-tab-link').classList.toggle('active',mode==='link');
  document.getElementById(prefix+'-so-tab-img').classList.toggle('active',mode==='img');
}

function downloadBAReport(){
  autoSave();
  const mods=JSON.parse(localStorage.getItem(storageKey()+'_mods')||'[]');
  const signoffImg=localStorage.getItem(storageKey()+'_ba_img')||'';
  const data={
    role:'ba',
    jira: document.getElementById('ba-jira')?.value.trim()||'',
    name: document.getElementById('ba-name')?.value.trim()||'',
    fsdStart:document.getElementById('ba-start')?.value||'',
    fsdEnd:  document.getElementById('ba-end')?.value||'',
    validator:document.getElementById('ba-validator')?.value.trim()||'',
    brief:   document.getElementById('ba-brief')?.value.trim()||'',
    signoffLink:document.getElementById('ba-signoff')?.value.trim()||'',
    signoffImg,
    fsdMods: mods,
    exportedAt: new Date().toISOString()
  };
  const jira=data.jira||'NoJira';
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`ba_report_${jira}_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

function downloadBAHtml(){
  autoSave();
  const mods=JSON.parse(localStorage.getItem(storageKey()+'_mods')||'[]');
  const signoffImg=localStorage.getItem(storageKey()+'_ba_img')||'';
  const jira=document.getElementById('ba-jira')?.value.trim()||'NoJira';
  const name=document.getElementById('ba-name')?.value.trim()||'—';
  const fsdStart=document.getElementById('ba-start')?.value||'—';
  const fsdEnd=document.getElementById('ba-end')?.value||'—';
  const validator=document.getElementById('ba-validator')?.value.trim()||'—';
  const brief=document.getElementById('ba-brief')?.value.trim()||'';
  const signoffLink=document.getElementById('ba-signoff')?.value.trim()||'';
  const now=new Date().toLocaleString('en-GB');
  const lnk=(url,txt)=>url?`<a href="${url}" target="_blank" style="color:#6a1b9a">${txt||url}</a>`:'—';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>BA Report – ${jira}</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f9f4ff;color:#1c1c1c;padding:28px 22px}
  h1{color:#6a1b9a;margin-bottom:4px} h2{color:#6a1b9a;font-size:1rem;margin:18px 0 8px;border-bottom:2px solid #ce93d8;padding-bottom:4px}
  .meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
  .mb{background:#fff;border:1px solid #ce93d8;border-radius:8px;padding:10px 14px}
  .mb label{font-size:8pt;font-weight:700;text-transform:uppercase;color:#6a1b9a;display:block;margin-bottom:3px}
  .mb-val{font-size:.92rem;color:#1c1c1c;word-break:break-word}
  .sec{background:#fff;border:1px solid #ce93d8;border-radius:8px;padding:16px 20px;margin-bottom:14px}
  .brief{background:#f3e5f5;border-left:4px solid #ab47bc;padding:10px 14px;border-radius:5px;font-size:.9rem;margin-bottom:12px;white-space:pre-wrap}
  table{border-collapse:collapse;width:100%;font-size:9pt;margin-top:8px}
  th{background:#6a1b9a;color:#fff;padding:7px 10px;text-align:left}
  tr:nth-child(even){background:#f3e5f5} td{padding:7px 10px;vertical-align:top}
  .proof-link{margin-top:8px;font-size:.88rem}
  @media print{body{background:#fff}}
</style></head><body>
<h1>&#128101; BA Report</h1>
<p style="color:#888;font-size:8pt;margin-bottom:16px">Generated: ${now} &nbsp;|&nbsp; CRONOS v3.0</p>
<div class="meta">
  <div class="mb"><label>Jira</label><div class="mb-val">${jira}</div></div>
  <div class="mb"><label>BA Name</label><div class="mb-val">${esc(name)}</div></div>
  <div class="mb"><label>FSD Start</label><div class="mb-val">${fsdStart}</div></div>
  <div class="mb"><label>FSD End</label><div class="mb-val">${fsdEnd}</div></div>
  <div class="mb"><label>Validator</label><div class="mb-val">${esc(validator)}</div></div>
</div>
${brief?`<div class="brief"><strong>Requirement Brief:</strong><br/>${esc(brief)}</div>`:''}
${(signoffLink||signoffImg)?`<div class="sec"><h2>&#9989; Sign-off Proof</h2>
  ${signoffLink?`<div class="proof-link">&#128279; ${lnk(signoffLink,'View Sign-off Mail / Approval')}</div>`:''}
  ${signoffImg?`<div style="margin-top:10px"><img src="${signoffImg}" style="max-width:100%;max-height:220px;border-radius:7px;border:1px solid #ce93d8;object-fit:contain;display:block" alt="Sign-off proof"/></div>`:''}
</div>`:''}
${mods.length?`<div class="sec"><h2>&#128221; FSD Modification History (${mods.length})</h2>
<table><thead><tr><th>#</th><th>Version</th><th>Start</th><th>End</th><th>Validator</th><th>Summary</th></tr></thead>
<tbody>${mods.map((m,i)=>`<tr><td>${i+1}</td><td>${esc(m.ver||'')}</td><td>${m.start||''}</td><td>${m.end||''}</td><td>${esc(m.validator||'')}</td><td>${esc(m.desc||'')}</td></tr>`).join('')}</tbody></table></div>`:''}
<p style="margin-top:24px;font-size:8pt;color:#aaa;text-align:center">CRONOS &nbsp;|&nbsp; BA Report &nbsp;|&nbsp; ${now}</p>
</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`ba_report_${jira}_${new Date().toISOString().slice(0,10)}.html`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

function resetBA(){
  if(!confirm('Clear all BA data?')) return;
  const key=storageKey();
  try{localStorage.removeItem(key);localStorage.removeItem(key+'_mods');localStorage.removeItem(key+'_ba_img');}catch(e){}
  BA_IDS.forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('fsd-mod-list').innerHTML=''; fsdModCount=0;
  const pd=document.getElementById('ba-so-preview');
  if(pd){pd.querySelector('img').src='';pd.style.display='none';}
}

(function(){loadSaved();})();
</script>
</body>
</html>
